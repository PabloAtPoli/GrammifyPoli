services:
  - type: web
    name: grammify-backend
    env: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r ../requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate --noinput
    startCommand: gunicorn backend.wsgi:application --bind 0.0.0.0:$PORT --workers 3
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: ALLOWED_HOSTS
        value: grammify-backend.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: grammify-postgres
          property: connectionString
  - type: psql
    name: grammify-postgres
    plan: free
    databaseName: grammifypoli
    user: grammifypoli_user
